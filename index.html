<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>WebAR - Cube & Torus</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  </head>
  <body style="margin: 0; overflow: hidden;">
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
      <a-marker preset="hiro">
        
        <a-text 
          value="Hello WebAR!" 
          position="0 1.5 0" 
          align="center" 
          color="#E74C3C" 
          scale="1.2 1.2 1.2">
        </a-text>

        <a-box 
          position="0 0.5 0" 
          color="#3498DB" 
          animation__rotate="property: rotation; to: 0 360 0; loop: true; dur: 3000; easing: linear"
          animation__float="property: position; to: 0 0.8 0; dir: alternate; loop: true; dur: 1500; easing: easeInOutSine">
        </a-box>

        <a-entity animation="property: rotation; to: 0 -360 0; loop: true; dur: 4000; easing: linear">
          <a-torus 
            position="1.2 0.5 0" 
            radius="0.2" 
            radius-tubular="0.05" 
            color="#F1C40F"
            animation="property: rotation; to: 360 360 0; loop: true; dur: 2000; easing: linear">
          </a-torus>
        </a-entity>

      </a-marker>
      
      <a-entity camera></a-entity>
    </a-scene>
  </body>
</html>
