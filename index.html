<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>WebAR - Car</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  </head>
  <body style="margin: 0; overflow: hidden;">
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
      <a-marker preset="hiro">
        
        <a-box position="0 0.4 0" depth="2" height="0.4" width="1" color="#3498DB"></a-box>
        
        <a-box position="0 0.8 0" depth="1" height="0.4" width="0.9" color="#2980B9"></a-box>
        
        <a-cylinder position="-0.55 0.2 0.6" radius="0.3" height="0.1" rotation="0 0 90" color="#2C3E50"></a-cylinder>
        <a-cylinder position="0.55 0.2 0.6" radius="0.3" height="0.1" rotation="0 0 90" color="#2C3E50"></a-cylinder>
        <a-cylinder position="-0.55 0.2 -0.6" radius="0.3" height="0.1" rotation="0 0 90" color="#2C3E50"></a-cylinder>
        <a-cylinder position="0.55 0.2 -0.6" radius="0.3" height="0.1" rotation="0 0 90" color="#2C3E50"></a-cylinder>

      </a-marker>
      <a-entity camera></a-entity>
    </a-scene>
  </body>
</html>
